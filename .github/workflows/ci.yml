name: CI

"on":
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      - name: Install project (locked, dev extra)
        run: uv sync --locked --extra dev --python 3.12

      - name: Run pytest
        run: uv run --extra dev pytest

      - name: Run ruff
        run: uv run --extra dev ruff check .

      - name: Run mypy
        run: uv run --extra dev mypy src

      - name: Build wheel (packaging guard)
        run: uv build --wheel
